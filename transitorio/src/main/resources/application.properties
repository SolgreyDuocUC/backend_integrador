# ===============================
# APP
# ===============================
spring.application.name=transitorio
server.port=8015

# ===============================
# PERFIL ACTIVO
# ===============================
# dev  -> entorno local
# prod -> servidor real
spring.profiles.active=dev

# ===============================
# CONFIGURACION GLOBAL
# ===============================

# --- Encoding
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# --- Timezone
spring.jackson.time-zone=America/Santiago

# --- Logging
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG


# ===============================
# BASE DE DATOS ? ENTORNO DEV
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/antuan_test
spring.datasource.username=antuan_app
spring.datasource.password=Antuan123*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


